<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Finder</title>
    
    <!-- Favicon Setup -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    
    <!-- Link to Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <!-- Link to External CSS -->
    <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>

    <!-- Menu and Recipe Section Container -->
    <div class="menu-container">
        <div class="menu">
            <h1>Food Finder</h1>
            
            <!-- Existing Recipe Search Form Section -->
            <section class="search-section">
                <form id="recipe-form" class="search-form">
                    <label for="recipe-input" class="visually-hidden">Search for a recipe or keyword</label>
                    <input type="text" id="recipe-input" placeholder="Enter a recipe name or keyword" required aria-label="Search for a recipe or keyword" oninput="showSuggestions()">
                    <button type="submit" aria-label="Search for recipes">Search</button>
                </form>
    
                <!-- Suggestions will be displayed here -->
                <div id="suggestionsContainer"></div>
                
                <!-- Display Recipe Details Here -->
                <!-- Display Recipe Details Here -->
<div id="recipe-details" class="recipe-details">
    <!-- This will be dynamically filled with recipe details -->
    <div id="recipe-steps">
        
        <ul id="steps-list">
            <!-- Steps will be dynamically inserted here -->
        </ul>
    </div>
</div>

            </section>
        </div>
    
        <div class="sidebar">
            <button onclick="toggleCategory('veg-recipes', 'veg')">Veg</button>
            <ul id="veg-recipes" class="recipe-list"></ul>
    
            <button onclick="toggleCategory('non-veg-recipes', 'non-veg')">Non-Veg</button>
            <ul id="non-veg-recipes" class="recipe-list"></ul>
    
            <button onclick="toggleCategory('seafood-recipes', 'sea food')">Sea Food</button>
            <ul id="seafood-recipes" class="recipe-list"></ul>
    
            <button onclick="toggleCategory('street-food-recipes', 'street food')">Street Food</button>
            <ul id="street-food-recipes" class="recipe-list"></ul>
    
            <button onclick="toggleCategory('tiffin-recipes', 'tiffin')">Tiffins</button>
            <ul id="tiffin-recipes" class="recipe-list"></ul>
        </div>
        

    
        <!-- External JS Script Links -->
        <script src="/frontend/js/api.js"></script>
        <script src="/frontend/js/app.js"></script>
    </body>
    </html>
