<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Finder</title>
    
    <!-- Favicon Setup -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    
    <!-- Link to Font Awesome (for icons) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <!-- Link to External CSS -->
    <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>
    <div class="main-content">
        <h1>Food Finder</h1>
        <form id="recipe-form">
            <input type="text" id="recipe-input" placeholder="Enter a recipe name or keyword" required>
            <button type="submit">Search</button>
        </form>

        <div id="recipe-details"></div>
    </div>

    <div class="sidebar">
        <h3>Recipe Categories</h3>
        <div>
            <h4>Veg</h4>
            <ul>
                <li><i class="fas fa-lemon"></i> Vegetable Biryani</li>
                <li><i class="fas fa-carrot"></i> Paneer Butter Masala</li>
                <li><i class="fas fa-leaf"></i> Chole Bhature</li>
                <li><i class="fas fa-pizza-slice"></i> Palak Paneer</li>
                <li><i class="fas fa-bread-slice"></i> Stuffed Paratha</li>
            </ul>
        </div>

        <div>
            <h4>Non-Veg</h4>
            <ul>
                <li><i class="fas fa-drumstick-bite"></i> Chicken Biryani</li>
                <li><i class="fas fa-drumstick-bite"></i> Butter Chicken</li>
                <li><i class="fas fa-bone"></i> Mutton Curry</li>
                <li><i class="fas fa-fish"></i> Fish Fry</li>
                <li><i class="fas fa-drumstick-bite"></i> Chicken Korma</li>
            </ul>
        </div>
    </div>

    <!-- Link to external script file -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
